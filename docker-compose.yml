services:
  db:
    image: postgres:15-alpine
    container_name: urbanpulse-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urbanpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./urbanpulse-backend
      dockerfile: Dockerfile
    container_name: urbanpulse-backend
    ports:
      - "8000:8000"
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/urbanpulse
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./urbanpulse-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/
    container_name: urbanpulse-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

volumes:
  pgdata:
