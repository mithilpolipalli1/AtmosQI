server {
    listen       80;
    server_name  localhost;

    # Serve static React UI
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Routing to index.html for Single Page Application
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # 'backend:8000' is the hostname if running in docker-compose.
        # Alternatively, if hosting front and back separately, API URLs will be hardcoded in vite.
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
